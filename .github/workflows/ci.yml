name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src tests scripts
      - run: python -m pytest -q
      - run: python -m satl --version
      - run: python scripts/offline_smoke.py

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - shell: powershell
        run: ./scripts/build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: satl-win-x64
          path: |
            dist/satl-win-x64.zip
            dist/satl-win-x64.zip.sha256
